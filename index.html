<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Bouquet Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#090d09;--surface:#111711;--panel:#141c14;--panel2:#0f160f;
  --border:#2a3a2a;--gold:#c9a84c;--gold-lt:#e2c97a;--gold-dim:#7a6430;
  --text:#f3ede0;--text-dim:#9e9484;
  --header-bg:#111711;--header-bg2:#0d130d;
  --shadow:0 24px 80px rgba(0,0,0,.7);
  --sheet-bg:#141c14;--input-bg:#111711;--chip-bg:#111711;
  --status-bg:#141c14;--toggle-bg:#2a3a2a;--toggle-knob:#c9a84c;
}
body.light {
  --bg:#f5f0e8;--surface:#fffdf7;--panel:#f0ead8;--panel2:#e8e0cc;
  --border:#d4c8a8;--gold:#9a6e1e;--gold-lt:#c49030;--gold-dim:#b8922a;
  --text:#1a1a0e;--text-dim:#6b614a;
  --header-bg:#f0ead8;--header-bg2:#e8e0cc;
  --shadow:0 24px 80px rgba(0,0,0,.15);
  --sheet-bg:#f0ead8;--input-bg:#fffdf7;--chip-bg:#fffdf7;
  --status-bg:#e8e0cc;--toggle-bg:#d4c8a8;--toggle-knob:#9a6e1e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;touch-action:none;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',serif;display:flex;flex-direction:column;transition:background .3s,color .3s}
header{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:54px;flex-shrink:0;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--header-bg) 0%,var(--header-bg2) 100%);z-index:20;transition:background .3s,border-color .3s;gap:8px}
.brand{display:flex;align-items:center;gap:9px;flex-shrink:0}
.brand-mark{width:28px;height:28px;border:1px solid var(--gold-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--gold);background:radial-gradient(circle,var(--panel) 0%,var(--bg) 100%);flex-shrink:0;transition:all .3s}
.brand h1{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:600;letter-spacing:.06em;color:var(--text);line-height:1;transition:color .3s;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
.theme-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 7px;border-radius:20px;border:1px solid var(--border);background:var(--toggle-bg);transition:all .3s;flex-shrink:0}
.theme-toggle .t-icon{font-size:12px;line-height:1;transition:opacity .3s}
.t-icon.sun{opacity:1}.t-icon.moon{opacity:.4}
body.light .t-icon.sun{opacity:.4}body.light .t-icon.moon{opacity:1}
.toggle-track{width:26px;height:14px;border-radius:8px;background:var(--border);position:relative;transition:background .3s}
.toggle-knob{width:10px;height:10px;border-radius:50%;background:var(--toggle-knob);position:absolute;top:2px;left:2px;transition:transform .3s,background .3s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
body.light .toggle-knob{transform:translateX(12px)}
.btn-icon{background:transparent;border:1px solid var(--border);color:var(--text-dim);width:30px;height:30px;padding:0;border-radius:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.btn-icon:hover,.btn-icon:active{border-color:var(--gold-dim);color:var(--text)}
.btn-icon:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.btn-icon svg{pointer-events:none}
.divider-v{width:1px;height:18px;background:var(--border);margin:0 2px;flex-shrink:0}
.btn-gold{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:2px;border:none;background:linear-gradient(135deg,#b8932e 0%,#d4ac4e 50%,#b8932e 100%);color:#080d08;font-family:'Cormorant Garamond',serif;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;cursor:pointer;box-shadow:0 2px 12px rgba(201,168,76,.25);transition:all .2s;white-space:nowrap;flex-shrink:0}
.btn-gold:hover,.btn-gold:active{background:linear-gradient(135deg,#c9a840 0%,#e0bc60 50%,#c9a840 100%);box-shadow:0 4px 20px rgba(201,168,76,.4)}
.btn-green{background:linear-gradient(135deg,#2d6a2d 0%,#3d8c3d 50%,#2d6a2d 100%)!important;color:#e8f5e8!important;box-shadow:0 2px 12px rgba(61,140,61,.25)!important}
.btn-green:hover,.btn-green:active{background:linear-gradient(135deg,#3a7a3a 0%,#4da04d 50%,#3a7a3a 100%)!important}
.mode-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;border:1px solid var(--border);background:var(--panel2);color:var(--text-dim);transition:all .25s;white-space:nowrap}
.mode-pill.editing{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.mode-pill-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim);transition:background .25s}
.mode-pill.editing .mode-pill-dot{background:var(--gold);box-shadow:0 0 6px rgba(201,168,76,.7)}
.studio{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:270px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:background .3s,border-color .3s}
.tab-nav{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;transition:border-color .3s;overflow-x:auto;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:0;padding:11px 3px;background:none;border:none;color:var(--text-dim);font-family:'Cormorant Garamond',serif;font-size:.62rem;letter-spacing:.13em;text-transform:uppercase;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;white-space:nowrap}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn:hover:not(.active){color:var(--text)}
.tab-panel{display:none;flex-direction:column;flex:1;overflow-y:auto;padding:16px 14px;-webkit-overflow-scrolling:touch}
.tab-panel.active{display:flex}
.tab-panel::-webkit-scrollbar{width:3px}
.tab-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.canvas-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden;min-width:0;transition:background .3s}
.canvas-area::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(128,128,128,.03) 39px,rgba(128,128,128,.03) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(128,128,128,.03) 39px,rgba(128,128,128,.03) 40px);pointer-events:none}
.canvas-frame{position:relative;border:1px solid var(--border);box-shadow:var(--shadow);border-radius:2px;overflow:hidden;transition:border-color .3s}
canvas#bouquetCanvas{display:block;width:100%;height:100%;position:relative;z-index:2;touch-action:none}
.co{position:absolute;width:24px;height:24px;z-index:5;pointer-events:none;color:var(--gold-dim);opacity:.5}
.co svg{width:100%;height:100%}
.co-tl{top:6px;left:6px}.co-tr{top:6px;right:6px;transform:scaleX(-1)}
.co-bl{bottom:6px;left:6px;transform:scaleY(-1)}.co-br{bottom:6px;right:6px;transform:scale(-1,-1)}
.canvas-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:.56rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);opacity:.38;z-index:6;pointer-events:none;white-space:nowrap}
.sec-label{font-size:.57rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:11px;margin-top:2px;transition:color .3s}
.flower-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.flower-chip{aspect-ratio:1;border:1px solid var(--border);border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:all .22s;background:var(--chip-bg);position:relative;overflow:hidden}
.flower-chip::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 60%,rgba(201,168,76,.08) 0%,transparent 70%);opacity:0;transition:opacity .22s}
.flower-chip:hover::before,.flower-chip.selected::before{opacity:1}
.flower-chip:hover{border-color:var(--gold-dim);transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.3)}
.flower-chip.selected{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 5px 16px rgba(201,168,76,.16)}
.flower-chip svg{width:38px;height:38px}
.flower-chip-name{font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);text-align:center}
.flower-chip.selected .flower-chip-name{color:var(--gold)}
.color-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .18s;flex-shrink:0}
.color-swatch:hover,.color-swatch:active{transform:scale(1.2)}
.color-swatch.selected{border-color:var(--gold);box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--gold)}
.slider-wrap{margin-bottom:18px}
.slider-label{display:flex;justify-content:space-between;align-items:center;font-size:.66rem;color:var(--text-dim);margin-bottom:8px;letter-spacing:.07em}
.slider-label span:last-child{color:var(--gold);font-weight:500}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:2px;background:var(--border);border-radius:2px;outline:none;transition:background .3s}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 0 0 3px rgba(201,168,76,.2);transition:box-shadow .2s}
input[type=range]:active::-webkit-slider-thumb{box-shadow:0 0 0 5px rgba(201,168,76,.3)}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;border:none;background:var(--gold);cursor:pointer}
.vase-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.vase-chip{aspect-ratio:.75;border:1px solid var(--border);border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:7px;gap:6px;cursor:pointer;transition:all .22s;background:var(--chip-bg);overflow:hidden}
.vase-chip:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
.vase-chip.selected{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.vase-chip-name{font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
.vase-chip.selected .vase-chip-name{color:var(--gold)}
.bg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.bg-chip{aspect-ratio:1;border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .22s;overflow:hidden;position:relative}
.bg-chip:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
.bg-chip.selected{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.bg-chip canvas{width:100%;height:100%;display:block}
.bg-chip-name{position:absolute;bottom:0;left:0;right:0;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:#fff;text-align:center;padding:3px 0 4px;background:linear-gradient(transparent,rgba(0,0,0,.6))}
.bg-chip.selected .bg-chip-name{color:var(--gold-lt)}
.frame-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:18px}
.frame-chip{border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .22s;background:var(--chip-bg);display:flex;align-items:center;justify-content:center;padding:10px 6px;flex-direction:column;gap:5px}
.frame-chip:hover{border-color:var(--gold-dim)}
.frame-chip.selected{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.frame-chip canvas{width:54px;height:38px;display:block}
.frame-chip-name{font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
.frame-chip.selected .frame-chip-name{color:var(--gold)}
.edit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.edit-title{font-family:'Playfair Display',serif;font-size:.9rem;color:var(--text)}
.edit-actions{display:flex;gap:6px}
.btn-sm{padding:4px 10px;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;border-radius:2px;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-family:'Cormorant Garamond',serif}
.btn-sm:hover{border-color:var(--gold-dim);color:var(--text)}
.btn-sm.danger{border-color:rgba(239,68,68,.4);color:rgba(239,68,68,.7)}
.btn-sm.danger:hover{border-color:#ef4444;color:#ef4444}
.msg-wrap{display:flex;flex-direction:column;gap:12px}
.msg-field label{display:block;font-size:.57rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:6px;transition:color .3s}
.msg-field input,.msg-field textarea{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:'Cormorant Garamond',serif;font-size:.9rem;padding:8px 10px;outline:none;resize:none;transition:border-color .2s,background .3s,color .3s}
.msg-field input:focus,.msg-field textarea:focus{border-color:var(--gold-dim)}
.msg-field textarea{height:76px;line-height:1.5}
.msg-font-row{display:flex;gap:6px;flex-wrap:wrap}
.font-chip{padding:5px 10px;border:1px solid var(--border);border-radius:2px;cursor:pointer;font-size:.86rem;color:var(--text-dim);background:var(--chip-bg);transition:all .2s}
.font-chip:hover{border-color:var(--gold-dim);color:var(--text)}
.font-chip.selected{border-color:var(--gold);color:var(--gold)}
.card-preview{margin-top:2px;border:1px solid var(--border);border-radius:3px;padding:14px;background:#f8f4ec;color:#2c2c2c;text-align:center;min-height:82px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;position:relative}
.card-preview::before{content:'';position:absolute;inset:4px;border:1px solid rgba(201,168,76,.3);pointer-events:none}
.card-preview-msg{font-size:.96rem;color:#2c2c2c;line-height:1.4}
.card-preview-from{font-size:.7rem;color:#888;letter-spacing:.1em}
.status-bar{height:28px;background:var(--status-bg);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:14px;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);flex-shrink:0;z-index:20;transition:background .3s,border-color .3s;overflow:hidden}
.status-dot{width:5px;height:5px;border-radius:50%;background:#3d8c3d;flex-shrink:0;box-shadow:0 0 7px rgba(61,140,61,.7)}
body.light .status-dot{background:#5aab5a}
.sep{color:var(--border)}.status-count{color:var(--gold)}
.mobile-nav{display:none;height:54px;flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);z-index:30;transition:background .3s,border-color .3s}
.mobile-nav-inner{display:flex;height:100%}
.mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:none;color:var(--text-dim);font-family:'Cormorant Garamond',serif;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;transition:all .2s;position:relative}
.mob-tab::after{content:'';position:absolute;bottom:0;left:30%;right:30%;height:2px;background:var(--gold);border-radius:1px 1px 0 0;transform:scaleX(0);transition:transform .2s}
.mob-tab.active{color:var(--gold)}.mob-tab.active::after{transform:scaleX(1)}
.mob-tab-icon{font-size:17px;line-height:1}
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;backdrop-filter:blur(2px)}
.sheet-overlay.visible{display:block}
.bottom-sheet{position:fixed;left:0;right:0;bottom:0;background:var(--sheet-bg);border-top:1px solid var(--border);border-radius:16px 16px 0 0;z-index:50;max-height:74vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,1,.3,1),background .3s;overflow:hidden}
.bottom-sheet.open{transform:translateY(0)}
.sheet-handle{width:34px;height:4px;border-radius:2px;background:var(--border);margin:9px auto 5px;flex-shrink:0}
.sheet-title{font-family:'Playfair Display',serif;font-size:.86rem;letter-spacing:.08em;color:var(--text);text-align:center;padding-bottom:9px;border-bottom:1px solid var(--border);flex-shrink:0}
.sheet-content{overflow-y:auto;padding:14px 14px 24px;-webkit-overflow-scrolling:touch;flex:1}
.sheet-content::-webkit-scrollbar{width:3px}
.sheet-content::-webkit-scrollbar-thumb{background:var(--border)}
.mob-actions{display:none;align-items:center;gap:7px;padding:7px 12px;background:var(--panel2);border-bottom:1px solid var(--border);flex-shrink:0;transition:background .3s,border-color .3s}
.mob-actions .btn-gold{flex:1;justify-content:center}
#toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(16px);background:linear-gradient(135deg,var(--panel),var(--surface));border:1px solid var(--gold-dim);color:var(--text);padding:9px 22px;font-size:.72rem;letter-spacing:.13em;text-transform:uppercase;border-radius:2px;opacity:0;transition:all .32s cubic-bezier(.16,1,.3,1);pointer-events:none;z-index:100;box-shadow:0 6px 28px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:700px){
  header{padding:0 12px;height:48px}.brand h1{font-size:.85rem}
  .sidebar{display:none}.studio{flex-direction:column}
  .canvas-area{flex:1;align-items:stretch;justify-content:stretch}
  .canvas-frame{border-radius:0;border-left:none;border-right:none;box-shadow:none}
  .mobile-nav{display:flex}.mob-actions{display:flex}
  .status-bar{padding:0 12px;gap:10px;font-size:.54rem}
  .divider-v.d-only{display:none}.btn-gold.d-save{display:none}
  #toast{bottom:128px;font-size:.68rem}
  .mode-pill{display:none}
}
@media(min-width:701px){
  .mobile-nav{display:none}.mob-actions{display:none}
  .sheet-overlay,.bottom-sheet{display:none!important}
}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-mark">✦</div>
    <h1>Bouquet Studio</h1>
  </div>
  <div class="header-right">
    <div class="mode-pill" id="modePill"><span class="mode-pill-dot"></span><span id="modeLabel">Place</span></div>
    <div class="divider-v d-only"></div>
    <div class="theme-toggle" id="themeToggle">
      <span class="t-icon sun">☀</span>
      <div class="toggle-track"><div class="toggle-knob"></div></div>
      <span class="t-icon moon">☾</span>
    </div>
    <div class="divider-v"></div>
    <button class="btn-icon" id="btnUndo" title="Undo" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
    </button>
    <button class="btn-icon" id="btnRedo" title="Redo" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m15 14 5-5-5-5"/><path d="M20 9H9.5a5.5 5.5 0 0 0 0 11H13"/></svg>
    </button>
    <button class="btn-icon" id="btnClear" title="Clear">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </button>
    <div class="divider-v d-only"></div>
    <button class="btn-gold btn-green" id="btnRandom">✦ Randomise</button>
    <div class="divider-v d-only"></div>
    <button class="btn-gold d-save" id="btnSave">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Save
    </button>
  </div>
</header>

<div class="mob-actions">
  <button class="btn-gold btn-green" id="btnRandomMob">✦ Randomise</button>
  <button class="btn-gold" id="btnSaveMob">↓ Save</button>
</div>

<div class="studio">
  <aside class="sidebar">
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="flowers">🌸 Flowers</button>
      <button class="tab-btn" data-tab="vase">🏺 Vase</button>
      <button class="tab-btn" data-tab="scene">🖼 Scene</button>
      <button class="tab-btn" data-tab="message">✉ Card</button>
    </div>
    <div class="tab-panel active" id="tab-flowers"><div id="flowersPanel"></div></div>
    <div class="tab-panel" id="tab-vase"><div id="vasePanel"></div></div>
    <div class="tab-panel" id="tab-scene"><div id="scenePanel"></div></div>

  </aside>

// ══ HELPERS ═══════════════════════════════════════════════════
function hexToRgb(h){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return r?[parseInt(r[1],16),parseInt(r[2],16),parseInt(r[3],16)]:[128,128,128]}
function rgbToHex(r,g,b){return'#'+(1<<24|r<<16|g<<8|b).toString(16).slice(1)}
function lighten(h,a){const[r,g,b]=hexToRgb(h);return rgbToHex(Math.min(255,r+a),Math.min(255,g+a),Math.min(255,b+a))}
function darken(h,a){const[r,g,b]=hexToRgb(h);return rgbToHex(Math.max(0,r-a),Math.max(0,g-a),Math.max(0,b-a))}
function rand(a,b){return a+Math.random()*(b-a)}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

// ══ BACKGROUNDS ═══════════════════════════════════════════════
function drawBg(c,w,h,id){
  c.save();
  if(id==='forest'){
    const g=c.createRadialGradient(w/2,h*.4,0,w/2,h/2,Math.max(w,h)*.75);
    g.addColorStop(0,'#111a11');g.addColorStop(1,'#080d08');c.fillStyle=g;c.fillRect(0,0,w,h);
    const v=c.createRadialGradient(w/2,h/2,h*.3,w/2,h/2,h*.9);
    v.addColorStop(0,'transparent');v.addColorStop(1,'rgba(0,0,0,.4)');c.fillStyle=v;c.fillRect(0,0,w,h);
  } else if(id==='ivory'){
    c.fillStyle='#f5eed8';c.fillRect(0,0,w,h);
    c.globalAlpha=.035;
    for(let i=0;i<h;i+=3){c.beginPath();c.moveTo(0,i);c.lineTo(w,i);c.strokeStyle=i%6===0?'#8b7355':'#a08060';c.lineWidth=.5;c.stroke();}
    for(let i=0;i<w;i+=4){c.beginPath();c.moveTo(i,0);c.lineTo(i,h);c.strokeStyle='#8b7355';c.lineWidth=.3;c.stroke();}
    c.globalAlpha=1;
    const vg=c.createRadialGradient(w/2,h/2,h*.2,w/2,h/2,h*.85);
    vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(160,120,60,.1)');c.fillStyle=vg;c.fillRect(0,0,w,h);
  } else if(id==='blush'){
    const g=c.createRadialGradient(w*.4,h*.35,0,w*.5,h*.5,Math.max(w,h)*.8);
    g.addColorStop(0,'#fce4ec');g.addColorStop(.4,'#f8bbd0');g.addColorStop(1,'#edd5dc');c.fillStyle=g;c.fillRect(0,0,w,h);
    c.globalAlpha=.07;
    [[w*.2,h*.2,w*.35],[w*.8,h*.6,w*.28],[w*.5,h*.8,w*.22]].forEach(([cx,cy,r])=>{
      const bg=c.createRadialGradient(cx,cy,0,cx,cy,r);bg.addColorStop(0,'#ff80ab');bg.addColorStop(1,'transparent');c.fillStyle=bg;c.fillRect(0,0,w,h);
    });c.globalAlpha=1;
  } else if(id==='midnight'){
    const g=c.createLinearGradient(0,0,w,h);g.addColorStop(0,'#0a0a1a');g.addColorStop(.5,'#0d0d2b');g.addColorStop(1,'#050510');c.fillStyle=g;c.fillRect(0,0,w,h);
    c.globalAlpha=.6;
    for(let i=0;i<80;i++){const x=Math.random()*w,y=Math.random()*h*.65,r=Math.random()*1.2;c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fillStyle=`hsl(${220+Math.random()*60},80%,${80+Math.random()*20}%)`;c.fill();}
    c.globalAlpha=1;
    const ag=c.createLinearGradient(0,0,0,h*.55);ag.addColorStop(0,'rgba(64,0,128,0)');ag.addColorStop(.3,'rgba(64,0,180,.1)');ag.addColorStop(.6,'rgba(0,128,160,.07)');ag.addColorStop(1,'transparent');c.fillStyle=ag;c.fillRect(0,0,w,h);
  } else if(id==='sage'){
    const g=c.createRadialGradient(w*.3,h*.3,0,w/2,h/2,Math.max(w,h)*.8);
    g.addColorStop(0,'#e8f0e0');g.addColorStop(.5,'#d4e4c8');g.addColorStop(1,'#c4d4b0');c.fillStyle=g;c.fillRect(0,0,w,h);
    c.globalAlpha=.055;
    for(let i=0;i<12;i++){const lx=Math.random()*w,ly=Math.random()*h,lw=40+Math.random()*60,lh=18+Math.random()*25,la=Math.random()*Math.PI;c.save();c.translate(lx,ly);c.rotate(la);c.beginPath();c.ellipse(0,0,lw,lh,0,0,Math.PI*2);c.fillStyle='#2d5a1e';c.fill();c.restore();}
    c.globalAlpha=1;
    const vg=c.createRadialGradient(w/2,h/2,h*.2,w/2,h/2,h*.8);vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(30,60,20,.08)');c.fillStyle=vg;c.fillRect(0,0,w,h);
  } else if(id==='marble'){
    c.fillStyle='#f0ece4';c.fillRect(0,0,w,h);
    c.globalAlpha=.07;
    for(let v=0;v<8;v++){let cx=Math.random()*w,cy=0;c.beginPath();c.moveTo(cx,cy);while(cy<h){const nx=cx+(Math.random()-.5)*60,ny=cy+30+Math.random()*40;c.bezierCurveTo(cx+(Math.random()-.5)*40,cy+10,nx+(Math.random()-.5)*20,ny-10,nx,ny);cx=nx;cy=ny;}c.strokeStyle=v%3===0?'#4a3a2a':v%3===1?'#8a7a6a':'#6a5a4a';c.lineWidth=.5+Math.random()*1.5;c.stroke();}
    c.globalAlpha=1;
    const mg=c.createLinearGradient(0,0,w,h);mg.addColorStop(0,'rgba(200,196,190,.1)');mg.addColorStop(.5,'transparent');mg.addColorStop(1,'rgba(180,176,170,.07)');c.fillStyle=mg;c.fillRect(0,0,w,h);
  } else {c.fillStyle='#111a11';c.fillRect(0,0,w,h);}
  c.restore();
}

// ══ EXPORT FRAME ══════════════════════════════════════════════
function drawExportFrame(c,w,h,id){
  if(id==='none')return;
  c.save();const pad=20;
  if(id==='thin'){c.strokeStyle='rgba(201,168,76,.7)';c.lineWidth=1.5;c.strokeRect(pad,pad,w-pad*2,h-pad*2);}
  else if(id==='double'){c.strokeStyle='rgba(201,168,76,.65)';c.lineWidth=1.5;c.strokeRect(pad,pad,w-pad*2,h-pad*2);c.lineWidth=.7;c.strokeRect(pad+6,pad+6,w-pad*2-12,h-pad*2-12);}
  else if(id==='ornate'){
    const g=c.createLinearGradient(0,0,w,0);g.addColorStop(0,'rgba(201,168,76,.35)');g.addColorStop(.3,'rgba(201,168,76,.8)');g.addColorStop(.7,'rgba(201,168,76,.8)');g.addColorStop(1,'rgba(201,168,76,.35)');
    c.strokeStyle=g;c.lineWidth=2;c.strokeRect(pad,pad,w-pad*2,h-pad*2);c.lineWidth=.6;c.strokeRect(pad+7,pad+7,w-pad*2-14,h-pad*2-14);
    [[pad,pad,0],[w-pad,pad,Math.PI/2],[w-pad,h-pad,Math.PI],[pad,h-pad,-Math.PI/2]].forEach(([cx,cy,ang])=>{
      c.save();c.translate(cx,cy);c.rotate(ang);c.strokeStyle='rgba(201,168,76,.85)';c.lineWidth=1;
      c.beginPath();c.moveTo(0,0);c.lineTo(22,0);c.moveTo(0,0);c.lineTo(0,22);c.stroke();
      c.beginPath();c.arc(0,0,5,0,Math.PI/2);c.stroke();c.restore();
    });
  }
  c.restore();
}

// ══ SNAP TO STEM ══════════════════════════════════════════════
function getVaseMouth(){
  const dpr=DPR(),cw=canvas.width/dpr,ch=canvas.height/dpr,sc=state.vase.scale;
  if(state.vase.type==='none')return null;
  const heights={classic:178,cylinder:198,bulb:198,tall:238,wide:158};
  const mouthY=ch-8-(heights[state.vase.type]||160)*sc;
  return{x:cw/2,y:mouthY};
}
function snapToStem(x,y){
  const mouth=getVaseMouth();if(!mouth)return{x,y,rot:flowerRot,snapped:false};
  const dx=x-mouth.x,dy=y-mouth.y,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>110)return{x,y,rot:flowerRot,snapped:false};
  const angle=Math.atan2(dy,dx);
  const snapDist=Math.max(35,dist);
  return{x:mouth.x+Math.cos(angle)*snapDist,y:Math.min(mouth.y+Math.sin(angle)*snapDist,mouth.y-12),rot:(angle*180/Math.PI)+90+rand(-8,8),snapped:true};
}

// ══ ICON DRAWERS ══════════════════════════════════════════════
function drawRoseIcon(s){s.innerHTML=`<circle cx="22" cy="20" r="9" fill="#e84a7a" opacity=".8"/><ellipse cx="18" cy="22" rx="6" ry="9" fill="#f472b6" opacity=".7" transform="rotate(-20,18,22)"/><ellipse cx="26" cy="22" rx="6" ry="9" fill="#ec4899" opacity=".7" transform="rotate(20,26,22)"/><ellipse cx="22" cy="14" rx="6" ry="8" fill="#f9a8d4" opacity=".6"/><circle cx="22" cy="20" r="4" fill="#be185d" opacity=".6"/><line x1="22" y1="30" x2="22" y2="44" stroke="#166534" stroke-width="2"/>`}
function drawTulipIcon(s){s.innerHTML=`<ellipse cx="22" cy="22" rx="8" ry="12" fill="#f87171" opacity=".85"/><ellipse cx="16" cy="20" rx="5" ry="11" fill="#fca5a5" opacity=".7"/><ellipse cx="28" cy="20" rx="5" ry="11" fill="#ef4444" opacity=".7"/><line x1="22" y1="33" x2="22" y2="44" stroke="#166534" stroke-width="2"/>`}
function drawDaisyIcon(s){let p='';for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2,cx=22+Math.cos(a)*11,cy=22+Math.sin(a)*11;p+=`<ellipse cx="${cx}" cy="${cy}" rx="4" ry="7" fill="white" opacity=".85" transform="rotate(${i*45},${cx},${cy})"/>`}s.innerHTML=p+`<circle cx="22" cy="22" r="6" fill="#fbbf24"/><line x1="22" y1="30" x2="22" y2="44" stroke="#166534" stroke-width="2"/>`}
function drawLilyIcon(s){let p='';for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2,cx=22+Math.cos(a)*10,cy=22+Math.sin(a)*10;p+=`<ellipse cx="${cx}" cy="${cy}" rx="4" ry="10" fill="#c084fc" opacity=".8" transform="rotate(${i*60},${cx},${cy})"/>`}s.innerHTML=p+`<circle cx="22" cy="22" r="4" fill="#7c3aed"/><line x1="22" y1="30" x2="22" y2="44" stroke="#166534" stroke-width="2"/>`}
function drawSunflowerIcon(s){let p='';for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;p+=`<ellipse cx="${22+Math.cos(a)*10}" cy="${22+Math.sin(a)*10}" rx="3" ry="7" fill="#fbbf24" transform="rotate(${i*30},${22+Math.cos(a)*10},${22+Math.sin(a)*10})"/>`}s.innerHTML=p+`<circle cx="22" cy="22" r="7" fill="#92400e"/><line x1="22" y1="30" x2="22" y2="44" stroke="#166534" stroke-width="2"/>`}
function drawLavenderIcon(s){s.innerHTML=`<rect x="19" y="10" width="6" height="22" rx="3" fill="#a78bfa" opacity=".7"/><ellipse cx="22" cy="12" rx="3" ry="5" fill="#8b5cf6"/><ellipse cx="18" cy="16" rx="3" ry="5" fill="#a78bfa" opacity=".8"/><ellipse cx="26" cy="16" rx="3" ry="5" fill="#a78bfa" opacity=".8"/><ellipse cx="19" cy="21" rx="3" ry="4" fill="#c4b5fd" opacity=".7"/><ellipse cx="25" cy="21" rx="3" ry="4" fill="#c4b5fd" opacity=".7"/><line x1="22" y1="32" x2="22" y2="44" stroke="#166534" stroke-width="2"/>`}

// ══ CANVAS DRAWERS ════════════════════════════════════════════
function drawFlower(f){
  ctx.save();ctx.translate(f.x,f.y);ctx.rotate((f.rot||0)*Math.PI/180);
  const s=f.size/48,sl=f.size*1.2;
  ctx.save();ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(f.size*.15,sl*.4,-f.size*.1,sl*.7,0,sl);ctx.strokeStyle=f.stemColor||'#166534';ctx.lineWidth=2.5*s;ctx.lineCap='round';ctx.stroke();
  ctx.save();ctx.translate(f.size*.12,sl*.45);ctx.rotate(-0.4);ctx.beginPath();ctx.ellipse(0,0,f.size*.18,f.size*.08,0,0,Math.PI*2);ctx.fillStyle=f.stemColor||'#166534';ctx.globalAlpha=.6;ctx.fill();ctx.restore();ctx.restore();
  const pc=f.petalCount||6;
  if(f.type==='rose')dRose(f,s,pc);else if(f.type==='tulip')dTulip(f,s);else if(f.type==='daisy')dDaisy(f,s,pc);else if(f.type==='lily')dLily(f,s,pc);else if(f.type==='sunflower')dSunflower(f,s,pc);else if(f.type==='lavender')dLavender(f,s);
  if(selectedFlower===f){
    // selection ring
    ctx.beginPath();ctx.arc(0,0,f.size*.72,0,Math.PI*2);ctx.strokeStyle='rgba(201,168,76,.95)';ctx.lineWidth=2;ctx.setLineDash([]);ctx.stroke();
    for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;ctx.beginPath();ctx.arc(Math.cos(a)*f.size*.72,Math.sin(a)*f.size*.72,3.5,0,Math.PI*2);ctx.fillStyle='#c9a84c';ctx.fill();}
    // rotate handle — sits above the flower (at -90° in local space = straight up)
    const rh=rotHandlePos(f);
    const lrx=rh.x-f.x, lry=rh.y-f.y; // to local space (ctx is already translated+rotated)
    // stem line from ring to handle
    ctx.beginPath();ctx.moveTo(0,-f.size*.72);ctx.lineTo(0,-(f.size*.72+22));
    ctx.strokeStyle='rgba(201,168,76,.7)';ctx.lineWidth=1.2;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);
    // handle circle
    ctx.beginPath();ctx.arc(0,-(f.size*.72+22),7,0,Math.PI*2);
    ctx.fillStyle=rotating===f?'#c9a84c':'rgba(201,168,76,.25)';ctx.fill();
    ctx.strokeStyle='#c9a84c';ctx.lineWidth=1.5;ctx.stroke();
    // rotate arrow icon inside handle
    ctx.save();ctx.strokeStyle=rotating===f?'#111':'rgba(201,168,76,.95)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.arc(0,-(f.size*.72+22),3.5,-Math.PI*.7,Math.PI*.7);ctx.stroke();
    ctx.beginPath();ctx.moveTo(Math.cos(Math.PI*.7)*3.5,Math.sin(Math.PI*.7)*3.5-(f.size*.72+22));
    ctx.lineTo(Math.cos(Math.PI*.7)*3.5+2.5,Math.sin(Math.PI*.7)*3.5-(f.size*.72+22)-2);
    ctx.lineTo(Math.cos(Math.PI*.7)*3.5-2,Math.sin(Math.PI*.7)*3.5-(f.size*.72+22)-1.5);
    ctx.stroke();ctx.restore();
  } else if(hoveredFlower===f){
    ctx.beginPath();ctx.arc(0,0,f.size*.7,0,Math.PI*2);ctx.strokeStyle='rgba(201,168,76,.4)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
  }
  ctx.restore();
}
function dRose(f,s,pc){const c=f.petalColor||'#e84a7a';for(let i=0;i<pc;i++){ctx.save();ctx.rotate((i/pc)*Math.PI*2);ctx.beginPath();ctx.ellipse(0,-f.size*.42,f.size*.22,f.size*.38,.1,0,Math.PI*2);ctx.fillStyle=c;ctx.globalAlpha=.75;ctx.fill();ctx.restore();}for(let i=0;i<4;i++){ctx.save();ctx.rotate((i/4)*Math.PI*2+.3);ctx.beginPath();ctx.ellipse(0,-f.size*.25,f.size*.14,f.size*.24,0,0,Math.PI*2);ctx.fillStyle=lighten(c,20);ctx.globalAlpha=.85;ctx.fill();ctx.restore();}ctx.beginPath();ctx.arc(0,0,f.size*.14,0,Math.PI*2);ctx.fillStyle=darken(c,25);ctx.globalAlpha=1;ctx.fill();}
function dTulip(f,s){const c=f.petalColor||'#f87171';ctx.beginPath();ctx.moveTo(0,-f.size*.6);ctx.bezierCurveTo(f.size*.45,-f.size*.6,f.size*.45,f.size*.1,0,f.size*.15);ctx.bezierCurveTo(-f.size*.45,f.size*.1,-f.size*.45,-f.size*.6,0,-f.size*.6);ctx.fillStyle=c;ctx.globalAlpha=.85;ctx.fill();ctx.beginPath();ctx.ellipse(-f.size*.3,-f.size*.3,f.size*.2,f.size*.45,-.3,0,Math.PI*2);ctx.fillStyle=lighten(c,15);ctx.globalAlpha=.65;ctx.fill();ctx.beginPath();ctx.ellipse(f.size*.3,-f.size*.3,f.size*.2,f.size*.45,.3,0,Math.PI*2);ctx.fill();}
function dDaisy(f,s,pc){const c=f.petalColor||'#ffffff';for(let i=0;i<pc;i++){ctx.save();ctx.rotate((i/pc)*Math.PI*2);ctx.beginPath();ctx.ellipse(0,-f.size*.45,f.size*.15,f.size*.35,0,0,Math.PI*2);ctx.fillStyle=c;ctx.globalAlpha=.85;ctx.fill();ctx.restore();}ctx.beginPath();ctx.arc(0,0,f.size*.2,0,Math.PI*2);ctx.fillStyle='#fbbf24';ctx.globalAlpha=1;ctx.fill();ctx.beginPath();ctx.arc(0,0,f.size*.12,0,Math.PI*2);ctx.fillStyle='#92400e';ctx.fill();}

function drawSnapGuide(){
  const m=getVaseMouth();if(!m)return;
  ctx.save();ctx.beginPath();ctx.arc(m.x,m.y,90,Math.PI,0);
  ctx.strokeStyle='rgba(201,168,76,.15)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
  ctx.restore();
}
function drawCard(){
  const m=state.message;if(!m.text&&!m.to&&!m.from)return;
  const dpr=DPR(),cw=canvas.width/dpr;
  const fm=CARD_FONTS.find(f=>f.id===m.font)||CARD_FONTS[0];
  const pw=190, padX=12, msgFontSize=12, lh=17;

  // Measure how many lines the message needs BEFORE drawing
  ctx.font=`italic ${msgFontSize}px ${fm.style}`;
  const msgLines=m.text?wrapLines(ctx,m.text,pw-padX*2):[];
  const toH   = m.to   ? 20 : 0;
  const msgH  = msgLines.length * lh;
  const fromH = m.from ? 20 : 0;
  const innerH= toH + (msgH>0?msgH+6:0) + fromH + 16; // 16 = top+bottom padding
  const ph    = Math.max(innerH, 52);

  const px=cw-pw-14, py=14;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.3)';ctx.shadowBlur=12;ctx.shadowOffsetY=3;
  ctx.fillStyle='#f8f4ec';rRect(ctx,px,py,pw,ph,4);ctx.fill();
  ctx.shadowColor='transparent';
  ctx.strokeStyle='rgba(201,168,76,.28)';ctx.lineWidth=1;rRect(ctx,px+4,py+4,pw-8,ph-8,2);ctx.stroke();

  let curY=py+14;
  if(m.to){
    ctx.font=`italic 10px ${fm.style}`;ctx.fillStyle='#999';
    ctx.fillText('To: '+m.to,px+padX,curY+10);
    curY+=toH;
  }
  if(msgLines.length){
    curY+=4;
    ctx.font=`italic ${msgFontSize}px ${fm.style}`;ctx.fillStyle='#2c2c2c';
    msgLines.forEach((l,i)=>ctx.fillText(l,px+padX,curY+(i+1)*lh));
    curY+=msgLines.length*lh+4;
  }
  if(m.from){
    ctx.font=`10px ${fm.style}`;ctx.fillStyle='#999';
    const fw=ctx.measureText('— '+m.from).width;
    ctx.fillText('— '+m.from,px+pw-padX-fw,py+ph-10);
  }
  ctx.restore();
}
function rRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}
// Returns all wrapped lines without a line cap
function wrapLines(c,text,mw){const words=text.split(' ');let line='',lines=[];for(const w of words){const t=line+w+' ';if(c.measureText(t).width>mw&&line){lines.push(line.trim());line=w+' ';}else line=t;}if(line.trim())lines.push(line.trim());return lines;}
function wrapTxt(c,text,x,y,mw,lh){wrapLines(c,text,mw).forEach((l,i)=>c.fillText(l,x,y+i*lh));}

// ══ RENDER ════════════════════════════════════════════════════
function render(){
  const dpr=DPR(),cw=canvas.width/dpr,ch=canvas.height/dpr;
  ctx.clearRect(0,0,cw,ch);
  drawBg(ctx,cw,ch,state.bg);
  drawSnapGuide();
  drawVase(state.vase);
  const sorted=[...state.flowers].sort((a,b)=>a.y-b.y);
  for(const f of sorted)drawFlower(f);
  drawCard();
  document.getElementById('statusCount').textContent=state.flowers.length;
}

// ══ CANVAS SIZE ═══════════════════════════════════════════════
const DPR=()=>Math.min(window.devicePixelRatio||1,3);
function sizeCanvas(){
  const area=document.getElementById('canvasArea'),ar=area.getBoundingClientRect();
  const mob=window.innerWidth<=700;
  if(mob){frameEl.style.width=ar.width+'px';frameEl.style.height=ar.height+'px';}
  else{const mw=Math.min(ar.width-40,560),mh=Math.min(ar.height-40,640),ratio=.88;let w=mw,h=w/ratio;if(h>mh){h=mh;w=h*ratio;}frameEl.style.width=w+'px';frameEl.style.height=h+'px';}
  const r=frameEl.getBoundingClientRect(),dpr=DPR();
  canvas.width=Math.round(r.width*dpr);
  canvas.height=Math.round(r.height*dpr);
  canvas.style.width=r.width+'px';
  canvas.style.height=r.height+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  render();
}

// ══ HIT TEST + ROTATE HANDLE ════════════════════════════════
// Returns the world-space position of the rotate handle for a flower
function rotHandlePos(f){
  const rotRad=(f.rot||0)*Math.PI/180;
  const handleDist=f.size*.72+22; // ring radius + stem
  return{
    x:f.x+Math.cos(rotRad-Math.PI/2)*handleDist,
    y:f.y+Math.sin(rotRad-Math.PI/2)*handleDist
  };
}
function hitRotHandle(x,y){
  if(!selectedFlower)return false;
  const h=rotHandlePos(selectedFlower);
  const dx=x-h.x,dy=y-h.y;
  return Math.sqrt(dx*dx+dy*dy)<12; // 12px hit radius
}
function hitTest(x,y){for(let i=state.flowers.length-1;i>=0;i--){const f=state.flowers[i],dx=x-f.x,dy=y-f.y;if(Math.sqrt(dx*dx+dy*dy)<f.size*.75)return f;}return null;}

// ══ SELECT / EDIT ═════════════════════════════════════════════
function selectFlower(f){
  selectedFlower=f;
  if(f){
    updatePill('Edit',true);document.getElementById('statusMode').textContent='Editing: '+f.type;
    activateTab('flowers');buildFlowersPanel(document.getElementById('flowersPanel'));
  } else {
    updatePill('Place',false);document.getElementById('statusMode').textContent='Click to place';
    buildFlowersPanel(document.getElementById('flowersPanel'));
  }
  render();
}
function deselect(){if(selectedFlower)selectFlower(null);}
function updatePill(label,editing){
  document.getElementById('modeLabel').textContent=label;
  document.getElementById('modePill').classList.toggle('editing',editing);
}

// ══ UNDO / REDO ═══════════════════════════════════════════════
function snapshot(){undoStack.push(JSON.stringify(state.flowers));if(undoStack.length>60)undoStack.shift();redoStack=[];updHist();}
function updHist(){document.getElementById('btnUndo').disabled=!undoStack.length;document.getElementById('btnRedo').disabled=!redoStack.length;}

// ══ MOUSE EVENTS ══════════════════════════════════════════════
canvas.addEventListener('mousedown',e=>{
  if(e.button===2)return;
  const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
  // Check rotate handle first (only when a flower is selected)
  if(hitRotHandle(x,y)){
    rotating=selectedFlower;
    rotStartAngle=Math.atan2(y-rotating.y,x-rotating.x);
    rotStartRot=rotating.rot||0;
    snapshot();canvas.style.cursor='alias';return;
  }
  const hit=hitTest(x,y);
  if(hit){dragging=hit;dragOffX=x-hit.x;dragOffY=y-hit.y;state.flowers=state.flowers.filter(f=>f!==hit);state.flowers.push(hit);snapshot();canvas.style.cursor='grabbing';selectFlower(hit);}
  else{deselect();const snap=snapToStem(x,y);snapshot();state.flowers.push({id:Date.now(),type:selectedFlowerType,x:snap.x,y:snap.y,petalColor:selectedPetalColor,stemColor:selectedStemColor,size:flowerSize,rot:snap.rot,petalCount});if(snap.snapped)toast('Snapped to stem');document.getElementById('statusMode').textContent='Placed '+selectedFlowerType;render();}
});
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
  if(rotating){
    const angle=Math.atan2(y-rotating.y,x-rotating.x);
    const delta=(angle-rotStartAngle)*180/Math.PI;
    rotating.rot=((rotStartRot+delta)%360+360)%360;
    // sync rotation slider in edit panel if visible
    const sliders=document.querySelectorAll('#flowersPanel input[type=range], #sheetContent input[type=range]');
    sliders.forEach(sl=>{if(sl._isRotSlider){sl.value=Math.round(rotating.rot<=180?rotating.rot:rotating.rot-360);const lv=sl.parentElement.querySelector('span:last-child');if(lv)lv.textContent=sl.value+'°';}});
    canvas.style.cursor='alias';render();return;
  }
  if(dragging){dragging.x=x-dragOffX;dragging.y=y-dragOffY;render();}
  else{
    const h=hitTest(x,y);
    const onHandle=hitRotHandle(x,y);
    const prev=hoveredFlower;hoveredFlower=h;
    canvas.style.cursor=onHandle?'alias':h?'grab':'crosshair';
    if(h!==prev||onHandle)render();
  }
});
canvas.addEventListener('mouseup',()=>{if(rotating){rotating=null;}dragging=null;canvas.style.cursor=selectedFlower?'alias':'crosshair';});
canvas.addEventListener('mouseleave',()=>{dragging=null;hoveredFlower=null;render();});
canvas.addEventListener('contextmenu',e=>{
  e.preventDefault();const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top,h=hitTest(x,y);
  if(h){snapshot();if(selectedFlower===h)selectFlower(null);state.flowers=state.flowers.filter(f=>f!==h);hoveredFlower=null;render();toast('Removed');}
});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top,h=hitTest(x,y);
  if(h){snapshot();h.size=Math.max(18,Math.min(100,h.size-e.deltaY*.14));if(selectedFlower===h)buildFlowersPanel(document.getElementById('flowersPanel'));render();}
},{passive:false});

// ══ TOUCH EVENTS ══════════════════════════════════════════════
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){clearTimeout(longPressTimer);const r=canvas.getBoundingClientRect(),mid={x:(e.touches[0].clientX+e.touches[1].clientX)/2-r.left,y:(e.touches[0].clientY+e.touches[1].clientY)/2-r.top};pinchFlower=dragging||hitTest(mid.x,mid.y);pinchStartDist=d2t(e.touches[0],e.touches[1]);if(pinchFlower)snapshot();dragging=null;return;}
  const t=e.touches[0];touchId=t.identifier;touchMoved=false;const{x,y}=tp(t),hit=hitTest(x,y);
  if(hitRotHandle(x,y)){rotating=selectedFlower;rotStartAngle=Math.atan2(y-rotating.y,x-rotating.x);rotStartRot=rotating.rot||0;snapshot();touchMoved=true;return;}
  if(hit){dragging=hit;dragOffX=x-hit.x;dragOffY=y-hit.y;state.flowers=state.flowers.filter(f=>f!==hit);state.flowers.push(hit);snapshot();selectFlower(hit);longPressTimer=setTimeout(()=>{if(!touchMoved){snapshot();if(selectedFlower===hit)selectFlower(null);state.flowers=state.flowers.filter(f=>f!==hit);dragging=null;hoveredFlower=null;render();toast('Removed');longPressTimer=null;}},600);}
  else{longPressTimer=setTimeout(()=>{longPressTimer=null;},600);}
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&pinchFlower&&pinchStartDist){const d=d2t(e.touches[0],e.touches[1]);pinchFlower.size=Math.max(18,Math.min(100,pinchFlower.size*(d/pinchStartDist)));pinchStartDist=d;render();return;}
  for(let i=0;i<e.changedTouches.length;i++){const t=e.changedTouches[i];if(t.identifier!==touchId)continue;const{x,y}=tp(t);if(rotating){const angle=Math.atan2(y-rotating.y,x-rotating.x);const delta=(angle-rotStartAngle)*180/Math.PI;rotating.rot=((rotStartRot+delta)%360+360)%360;render();continue;}const d=Math.abs(x-(dragging?dragging.x+dragOffX:x))+Math.abs(y-(dragging?dragging.y+dragOffY:y));if(d>6)touchMoved=true;if(dragging){dragging.x=x-dragOffX;dragging.y=y-dragOffY;render();}}
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();pinchStartDist=null;pinchFlower=null;if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
  rotating=null;
  for(let i=0;i<e.changedTouches.length;i++){const t=e.changedTouches[i];if(t.identifier!==touchId)continue;const{x,y}=tp(t);if(!touchMoved&&!dragging){deselect();const snap=snapToStem(x,y);snapshot();state.flowers.push({id:Date.now(),type:selectedFlowerType,x:snap.x,y:snap.y,petalColor:selectedPetalColor,stemColor:selectedStemColor,size:flowerSize,rot:snap.rot,petalCount});if(snap.snapped)toast('Snapped to stem');render();}dragging=null;touchId=null;}
},{passive:false});
function tp(t){const r=canvas.getBoundingClientRect();return{x:t.clientX-r.left,y:t.clientY-r.top};}
function d2t(t1,t2){const dx=t1.clientX-t2.clientX,dy=t1.clientY-t2.clientY;return Math.sqrt(dx*dx+dy*dy);}

// ══ RANDOMISE ═════════════════════════════════════════════════
function randomiseBouquet(){
  snapshot();selectedFlower=null;updatePill('Place',false);state.flowers=[];
  const dpr=DPR(),cw=canvas.width/dpr,ch=canvas.height/dpr,mouth=getVaseMouth()||{x:cw/2,y:ch*.55};
  const count=9+Math.floor(Math.random()*6);
  for(let i=0;i<count;i++){
    const angle=-Math.PI/2+(-Math.PI/3+(i/count)*Math.PI*2/3);
    const stemLen=rand(55,145);
    state.flowers.push({id:Date.now()+i,type:pick(FLOWER_TYPES).id,x:mouth.x+Math.cos(angle)*stemLen,y:mouth.y+Math.sin(angle)*stemLen,petalColor:pick(PETAL_COLORS),stemColor:pick(STEM_COLORS.slice(0,5)),size:rand(30,60),rot:(angle*180/Math.PI)+90+rand(-18,18),petalCount:4+Math.floor(Math.random()*7)});
  }
  state.flowers.sort(()=>Math.random()-.5);
  buildFlowersPanel(document.getElementById('flowersPanel'));render();toast('Bouquet randomised ✓');
}

// ══ PANEL BUILDERS ════════════════════════════════════════════
function buildFlowersPanel(container){
  container.innerHTML='';
  if(selectedFlower){buildEditPanel(container,selectedFlower);return;}
  addLbl(container,'Choose Flower');
  const grid=document.createElement('div');grid.className='flower-grid';
  FLOWER_TYPES.forEach(ft=>{
    const chip=el('div','flower-chip'+(ft.id===selectedFlowerType?' selected':''));
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('viewBox','0 0 44 44');ft.icon(svg);
    const lbl=el('div','flower-chip-name');lbl.textContent=ft.name;chip.append(svg,lbl);
    chip.addEventListener('click',()=>{selectedFlowerType=ft.id;container.querySelectorAll('.flower-chip').forEach(c=>c.classList.remove('selected'));chip.classList.add('selected');document.getElementById('statusMode').textContent='Selected: '+ft.name;});
    grid.appendChild(chip);
  });container.appendChild(grid);
  addLbl(container,'Petal Colour');colRow(container,PETAL_COLORS,()=>selectedPetalColor,c=>selectedPetalColor=c);
  addLbl(container,'Stem Colour');colRow(container,STEM_COLORS,()=>selectedStemColor,c=>selectedStemColor=c);
  addSldr(container,'Bloom Size',24,80,flowerSize,'',v=>flowerSize=v);
  addSldr(container,'Rotation',-180,180,flowerRot,'°',v=>flowerRot=v);
  addSldr(container,'Petal Count',4,12,petalCount,'',v=>petalCount=v);
}

function buildEditPanel(container,f){
  const hdr=el('div','edit-header');const title=el('div','edit-title');title.textContent='Edit Flower';
  const acts=el('div','edit-actions');
  const dupBtn=el('button','btn-sm');dupBtn.textContent='Duplicate';
  dupBtn.onclick=()=>{snapshot();const c={...f,id:Date.now(),x:f.x+22,y:f.y-22};state.flowers.push(c);render();toast('Duplicated');};
  const delBtn=el('button','btn-sm danger');delBtn.textContent='Delete';
  delBtn.onclick=()=>{snapshot();state.flowers=state.flowers.filter(fl=>fl!==f);selectFlower(null);render();toast('Deleted');};
  acts.append(dupBtn,delBtn);hdr.append(title,acts);container.appendChild(hdr);
  addLbl(container,'Flower Type');
  const grid=el('div','flower-grid');
  FLOWER_TYPES.forEach(ft=>{
    const chip=el('div','flower-chip'+(ft.id===f.type?' selected':''));
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('viewBox','0 0 44 44');ft.icon(svg);
    const lbl=el('div','flower-chip-name');lbl.textContent=ft.name;chip.append(svg,lbl);
    chip.onclick=()=>{snapshot();f.type=ft.id;container.querySelectorAll('.flower-chip').forEach(c=>c.classList.remove('selected'));chip.classList.add('selected');render();};
    grid.appendChild(chip);
  });container.appendChild(grid);
  addLbl(container,'Petal Colour');colRow(container,PETAL_COLORS,()=>f.petalColor,c=>{snapshot();f.petalColor=c;render();});
  addLbl(container,'Stem Colour');colRow(container,STEM_COLORS,()=>f.stemColor,c=>{snapshot();f.stemColor=c;render();});
  addSldr(container,'Bloom Size',18,100,Math.round(f.size),'',v=>{f.size=v;render();});
  addSldr(container,'Rotation',-180,180,Math.round((f.rot||0)<=180?(f.rot||0):(f.rot||0)-360),'°',v=>{f.rot=((v%360)+360)%360;render();},{mark:'rot'});
  addSldr(container,'Petal Count',4,12,f.petalCount||6,'',v=>{f.petalCount=v;render();});
  const done=el('button','btn-gold');done.style.cssText='width:100%;justify-content:center;margin-top:6px';done.textContent='Done Editing';done.onclick=()=>selectFlower(null);container.appendChild(done);
}

function buildVasePanel(container){
  container.innerHTML='';addLbl(container,'Vase Style');
  const grid=el('div','vase-grid');
  VASE_TYPES.forEach(vt=>{
    const chip=el('div','vase-chip'+(vt.id===state.vase.type?' selected':''));
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('viewBox','0 0 60 80');svg.setAttribute('width','46');svg.innerHTML=vaseSVG(vt.id,'#2a3a4a');
    const lbl=el('div','vase-chip-name');lbl.textContent=vt.name;chip.append(svg,lbl);
    chip.onclick=()=>{state.vase.type=vt.id;container.querySelectorAll('.vase-chip').forEach(c=>c.classList.remove('selected'));chip.classList.add('selected');render();};
    grid.appendChild(chip);
  });container.appendChild(grid);
  addLbl(container,'Vase Colour');colRow(container,VASE_COLORS,()=>state.vase.color,c=>{state.vase.color=c;render();});
  addSldr(container,'Vase Scale',60,160,Math.round(state.vase.scale*100),'×',v=>{state.vase.scale=v/100;render();},{t:v=>(v/100).toFixed(1)});
}

function buildScenePanel(container){
  container.innerHTML='';addLbl(container,'Canvas Background');
  const bgGrid=el('div','bg-grid');
  BG_PRESETS.forEach(bg=>{
    const chip=el('div','bg-chip'+(bg.id===state.bg?' selected':''));
    const mc=document.createElement('canvas');mc.width=60;mc.height=60;drawBg(mc.getContext('2d'),60,60,bg.id);
    const nm=el('div','bg-chip-name');nm.textContent=bg.name;chip.append(mc,nm);
    chip.onclick=()=>{state.bg=bg.id;bgGrid.querySelectorAll('.bg-chip').forEach(c=>c.classList.remove('selected'));chip.classList.add('selected');render();};
    bgGrid.appendChild(chip);
  });container.appendChild(bgGrid);
  addLbl(container,'Export Frame');
  const frGrid=el('div','frame-grid');
  FRAME_PRESETS.forEach(fr=>{
    const chip=el('div','frame-chip'+(fr.id===state.frame?' selected':''));
    const mc=document.createElement('canvas');mc.width=54;mc.height=38;
    const mc2=mc.getContext('2d');mc2.fillStyle='#1a1a1a';mc2.fillRect(0,0,54,38);drawExportFrame(mc2,54,38,fr.id);
    const nm=el('div','frame-chip-name');nm.textContent=fr.name;chip.append(mc,nm);
    chip.onclick=()=>{state.frame=fr.id;frGrid.querySelectorAll('.frame-chip').forEach(c=>c.classList.remove('selected'));chip.classList.add('selected');};
    frGrid.appendChild(chip);
  });container.appendChild(frGrid);
}

function buildMessagePanel(container){
  container.innerHTML='';const wrap=el('div','msg-wrap');
  ['From','To','Message'].forEach(lbl=>{
    const field=el('div','msg-field');const label=el('label');label.textContent=lbl;const key=lbl==='Message'?'text':lbl.toLowerCase();let inp;
    if(lbl==='Message'){inp=document.createElement('textarea');inp.placeholder='Write something beautiful…';inp.maxLength=200;}
    else{inp=document.createElement('input');inp.type='text';inp.placeholder=lbl==='From'?'Your name…':'Recipient…';inp.maxLength=40;}
    inp.value=state.message[key]||'';
    inp.addEventListener('input',e=>{state.message[key]=e.target.value;updateCardPreviews();render();});
    field.append(label,inp);wrap.appendChild(field);
  });
  const fl=el('div','msg-field');const flLbl=el('label');flLbl.textContent='Card Font';
  const fr=el('div','msg-font-row');
  CARD_FONTS.forEach(f=>{
    const chip=el('div','font-chip'+(f.id===state.message.font?' selected':''));chip.textContent=f.label;chip.style.fontFamily=f.style;
    chip.onclick=()=>{state.message.font=f.id;fr.querySelectorAll('.font-chip').forEach(c=>c.classList.remove('selected'));chip.classList.add('selected');updateCardPreviews();render();};
    fr.appendChild(chip);
  });fl.append(flLbl,fr);wrap.appendChild(fl);
  const prevLbl=el('p','sec-label');prevLbl.style.marginTop='8px';prevLbl.textContent='Preview';
  const prev=el('div','card-preview');const pm=el('div','card-preview-msg');pm.style.fontStyle='italic';pm.style.color='#aaa';pm.textContent='Your message will appear here…';const pf=el('div','card-preview-from');prev.append(pm,pf);wrap.append(prevLbl,prev);container.appendChild(wrap);
  const fm=CARD_FONTS.find(f=>f.id===state.message.font)||CARD_FONTS[0];pm.style.fontFamily=fm.style;pf.style.fontFamily=fm.style;
  if(state.message.text||state.message.to){pm.style.color='#2c2c2c';pm.textContent=(state.message.to?'To '+state.message.to+': ':'')+state.message.text;}
  if(state.message.from)pf.textContent='— '+state.message.from;
}

function updateCardPreviews(){
  document.querySelectorAll('.card-preview').forEach(prev=>{
    const pm=prev.querySelector('.card-preview-msg'),pf=prev.querySelector('.card-preview-from');if(!pm)return;
    const fm=CARD_FONTS.find(f=>f.id===state.message.font)||CARD_FONTS[0];
    pm.style.fontFamily=fm.style;if(pf)pf.style.fontFamily=fm.style;
    if(state.message.text||state.message.to){pm.style.color='#2c2c2c';pm.style.fontStyle='italic';pm.textContent=(state.message.to?'To '+state.message.to+': ':'')+state.message.text;}
    else{pm.style.color='#aaa';pm.style.fontStyle='italic';pm.textContent='Your message will appear here…';}
    if(pf)pf.textContent=state.message.from?'— '+state.message.from:'';
  });
}

// ── micro helpers ──
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function addLbl(c,t){const p=el('p','sec-label');p.textContent=t;c.appendChild(p);}
function colRow(container,colors,getVal,setVal){
  const row=el('div','color-row');
  colors.forEach(c=>{
    const sw=el('div','color-swatch'+(c===getVal()?' selected':''));sw.style.background=c;
    if(c==='#ffffff'||c==='#e2e8f0')sw.style.outline='1px solid #999';
    sw.onclick=()=>{setVal(c);row.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));sw.classList.add('selected');};
    row.appendChild(sw);
  });container.appendChild(row);return row;
}
function addSldr(container,label,min,max,val,unit,onChange,opts={}){
  const wrap=el('div','slider-wrap'),lrow=el('div','slider-label'),ltxt=el('span'),lval=el('span');
  ltxt.textContent=label;lval.textContent=opts.t?opts.t(val):(val+unit);lrow.append(ltxt,lval);
  const inp=document.createElement('input');inp.type='range';inp.min=min;inp.max=max;inp.value=val;
  if(opts.mark)inp._isRotSlider=true;
  inp.addEventListener('input',()=>{const v=+inp.value;lval.textContent=opts.t?opts.t(v):(v+unit);onChange(v);});
  wrap.append(lrow,inp);container.appendChild(wrap);
}
function vaseSVG(type,c){const l=lighten(c,20);
  if(type==='classic')return`<path d="M30 10C45 10 45 12 48 20C52 40 52 60 52 75C52 75 8 75 8 60C8 40 12 20 15 12C15 10 30 10 30 10Z" fill="${c}"/><ellipse cx="30" cy="10" rx="15" ry="4" fill="${l}"/>`;
  if(type==='cylinder')return`<rect x="12" y="10" width="36" height="60" rx="2" fill="${c}"/><ellipse cx="30" cy="10" rx="18" ry="5" fill="${l}"/>`;
  if(type==='bulb')return`<ellipse cx="30" cy="52" rx="22" ry="22" fill="${c}"/><rect x="22" y="10" width="16" height="30" rx="3" fill="${c}"/><ellipse cx="30" cy="10" rx="8" ry="3" fill="${l}"/>`;
  if(type==='tall')return`<path d="M25 5C35 5 38 15 42 40C42 65 42 72 18 72C18 65 18 40 22 15Z" fill="${c}"/><ellipse cx="30" cy="5" rx="10" ry="3" fill="${l}"/>`;
  if(type==='wide')return`<path d="M30 15C32 15 40 25 50 50C55 62 5 62 10 50C20 25 28 15 30 15Z" fill="${c}"/><ellipse cx="30" cy="15" rx="6" ry="3" fill="${l}"/>`;
  return`<text x="30" y="45" text-anchor="middle" fill="${lighten(c,50)}" font-size="28">∅</text>`;
}
function activateTab(id){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+id));
}

// ══ INIT PANELS ═══════════════════════════════════════════════
buildFlowersPanel(document.getElementById('flowersPanel'));
buildVasePanel(document.getElementById('vasePanel'));
buildScenePanel(document.getElementById('scenePanel'));
buildMessagePanel(document.getElementById('messagePanel'));

document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>activateTab(b.dataset.tab)));

// ══ MOBILE SHEET ══════════════════════════════════════════════
const overlay=document.getElementById('sheetOverlay'),sheet=document.getElementById('bottomSheet'),sheetTitle=document.getElementById('sheetTitle'),sheetContent=document.getElementById('sheetContent');
let sheetOpen=false;
const sheetTitles={flowers:'Flowers',vase:'Vase & Colour',scene:'Scene & Frame',message:'Card & Message'};
function openSheet(type){
  sheetTitle.textContent=sheetTitles[type]||type;sheetContent.innerHTML='';
  if(type==='flowers')buildFlowersPanel(sheetContent);else if(type==='vase')buildVasePanel(sheetContent);else if(type==='scene')buildScenePanel(sheetContent);else buildMessagePanel(sheetContent);
  overlay.classList.add('visible');requestAnimationFrame(()=>sheet.classList.add('open'));sheetOpen=true;
}
function closeSheet(){sheet.classList.remove('open');setTimeout(()=>overlay.classList.remove('visible'),350);document.querySelectorAll('.mob-tab').forEach(t=>t.classList.remove('active'));sheetOpen=false;}
overlay.addEventListener('click',closeSheet);
document.querySelectorAll('.mob-tab').forEach(b=>{b.addEventListener('click',()=>{const type=b.dataset.sheet;if(sheetOpen&&b.classList.contains('active')){closeSheet();return;}document.querySelectorAll('.mob-tab').forEach(t=>t.classList.remove('active'));b.classList.add('active');openSheet(type);});});
let sheetStartY=0;
sheet.addEventListener('touchstart',e=>{sheetStartY=e.touches[0].clientY;},{passive:true});
sheet.addEventListener('touchmove',e=>{if(e.touches[0].clientY-sheetStartY>60&&sheetContent.scrollTop===0)closeSheet();},{passive:true});

// ══ HEADER BUTTONS ════════════════════════════════════════════
document.getElementById('btnUndo').addEventListener('click',()=>{if(!undoStack.length)return;redoStack.push(JSON.stringify(state.flowers));state.flowers=JSON.parse(undoStack.pop());selectedFlower=null;updatePill('Place',false);updHist();render();toast('Undone');});
document.getElementById('btnRedo').addEventListener('click',()=>{if(!redoStack.length)return;undoStack.push(JSON.stringify(state.flowers));state.flowers=JSON.parse(redoStack.pop());selectedFlower=null;updatePill('Place',false);updHist();render();toast('Redone');});
document.getElementById('btnClear').addEventListener('click',()=>{if(!state.flowers.length)return;snapshot();state.flowers=[];selectedFlower=null;updatePill('Place',false);buildFlowersPanel(document.getElementById('flowersPanel'));render();toast('Canvas cleared');});
document.getElementById('btnRandom').addEventListener('click',randomiseBouquet);
document.getElementById('btnRandomMob').addEventListener('click',randomiseBouquet);
function doSave(){
  const dpr=DPR();
  const cssW=canvas.width/dpr, cssH=canvas.height/dpr;
  const oc=document.createElement('canvas');
  oc.width=canvas.width; oc.height=canvas.height;
  const oc2=oc.getContext('2d');
  oc2.drawImage(canvas,0,0);
  oc2.setTransform(dpr,0,0,dpr,0,0);
  drawExportFrame(oc2,cssW,cssH,state.frame);
  const dataURL=oc.toDataURL('image/png',1.0);

  // iOS Safari silently ignores <a download> clicks — open image in new tab instead
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||
    (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);

  if(isIOS){
    const w=window.open('','_blank');
    if(w){
      w.document.write(
        '<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"/>'+
        '<style>body{margin:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}'+
        'img{max-width:100%;height:auto;display:block;border-radius:4px}'+
        'p{color:#c9a84c;font-family:sans-serif;font-size:15px;text-align:center;padding:16px;margin:0}'+
        '</style></head><body>'+
        '<img src="'+dataURL+'"/>'+
        '<p>Press &amp; hold the image → Save to Photos</p>'+
        '</body></html>'
      );
      w.document.close();
    } else {
      window.location.href=dataURL;
    }
    toast('Hold image → Save to Photos');
  } else {
    const a=document.createElement('a');
    a.download='bouquet-studio.png';
    a.href=dataURL;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    toast('Saved ✓');
  }
}
document.getElementById('btnSave').addEventListener('click',doSave);
document.getElementById('btnSaveMob').addEventListener('click',doSave);
document.getElementById('themeToggle').addEventListener('click',()=>{isDark=!isDark;document.body.classList.toggle('light',!isDark);render();});

let toastTm;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTm);toastTm=setTimeout(()=>el.classList.remove('show'),2200);}

window.addEventListener('resize',sizeCanvas);
document.body.addEventListener('touchmove',e=>{if(e.target!==canvas)e.preventDefault();},{passive:false});
sizeCanvas();
if(window.innerWidth>700)document.getElementById('canvasHint').textContent='Click to place · Drag · Right-click to delete · Scroll to resize';
document.getElementById('statusMode').textContent='Select a flower & click to place';
